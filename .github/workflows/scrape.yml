name: Update movie feed

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Number of pages to scrape'
        required: true
        default: '5'
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatically caches pip dependencies based on requirements.txt

      # Cache Playwright browsers so they don't download every time (~70-100MB)
      - name: Cache Playwright Binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      # Only install Playwright if the cache missed
      - name: Install Playwright Browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run scraper
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          MAX_PAGES: ${{ inputs.max_pages || '5' }}
        run: python scripts/scrape.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movies.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated feed update: $(date -u)" && git push)
