name: Update movie feed

on:
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC — adjust as you like
  workflow_dispatch:       # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          FEED_URL: ${{ vars.FEED_URL }}
          MAX_PAGES: ${{ vars.MAX_PAGES }}
        run: python scripts/scrape.py

      - name: Commit updated data
        run: |
          git config user.name "movie-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/movies.json
          git diff --cached --quiet || git commit -m "Update movie data"
          git push
